@if(evaluation !== null) {
  <div class="result-container" >

  <h1>Résultat de votre interview</h1>

  <!-- Score visuel -->
  <div class="score-circle">
    <span class="score-number">{{ evaluation.score }}</span>
    <span class="score-label">/100</span>
  </div>

  <!-- Feedback général -->
  <div class="card">
    <h3>Feedback général</h3>
    <p>{{ evaluation.feedback }}</p>
  </div>

  <!-- Points forts -->
  <div class="card success">
    <h3>Points forts</h3>
    <p>{{  evaluation.pointsForts }}</p>
  </div>

  <!-- Points à améliorer -->
  <div class="card warning">
    <h3>Points à améliorer</h3>
    <p>{{evaluation.pointsAmelioration }}</p>
  </div>

  <button (click)="restart()">Recommencer une interview</button>
</div>
}
